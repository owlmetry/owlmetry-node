name: Auto-tag release

# Triggered by pushes to main. paths-ignore skips Examples/docs/gitignore-only
# pushes — note this also skips pushes that change zero paths (empty commits).
# The bot's bump commit uses [skip ci] so this workflow doesn't loop on itself.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'Examples/**'
      - '**.md'
      - '.gitignore'

concurrency:
  group: auto-tag
  cancel-in-progress: false

jobs:
  wait-for-tests:
    name: Wait for Test workflow
    runs-on: ubuntu-latest
    steps:
      - name: Wait for unit + integration
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-regexp: "(Unit tests|Integration tests)"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success

  tag-and-publish:
    name: Bump, tag, publish
    needs: wait-for-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Compute next version
        id: ver
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [[ -z "$latest" ]]; then
            # No v* tags yet — seed from package.json so we don't collide
            # with versions already published to npm.
            current=$(node -p "require('./package.json').version")
          else
            current=${latest#v}
          fi
          IFS='.' read -r MAJ MIN PAT <<< "$current"

          msg=$(git log -1 --pretty=%s ${{ github.sha }})
          # feat!:/fix!:/BREAKING CHANGE → major; feat:/feat(...) → minor; else patch.
          # Pre-1.0 semver convention: while MAJ is 0 the API is unstable, so a
          # breaking marker bumps minor instead of jumping straight to 1.0.0.
          # The first major release happens manually (tag v1.0.0 by hand) — this
          # workflow only takes over once the project is past 0.x.
          if [[ "$msg" == *"!:"* || "$msg" == *"BREAKING CHANGE"* ]]; then
            if [[ "$MAJ" == "0" ]]; then
              MIN=$((MIN+1)); PAT=0
            else
              MAJ=$((MAJ+1)); MIN=0; PAT=0
            fi
          elif [[ "$msg" == feat:* || "$msg" == feat\(* ]]; then
            MIN=$((MIN+1)); PAT=0
          else
            PAT=$((PAT+1))
          fi

          version="${MAJ}.${MIN}.${PAT}"
          next="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next (from '$msg')"

      - name: Bump package.json
        run: npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Commit, tag, push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.ver.outputs.next }} [skip ci]"
          git tag "${{ steps.ver.outputs.next }}"
          git push origin main
          git push origin "${{ steps.ver.outputs.next }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.next }}" \
            --title "${{ steps.ver.outputs.next }}" \
            --generate-notes

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
