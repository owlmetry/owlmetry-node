name: Test

on:
  push:
  pull_request:
  repository_dispatch:
    types: [monorepo-updated]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: owlmetry_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout SDK
        uses: actions/checkout@v5
        with:
          path: sdk

      - name: Checkout main repo
        uses: actions/checkout@v5
        with:
          repository: owlmetry/owlmetry
          path: main

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Get pnpm store path
        id: pnpm-store
        working-directory: main
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('main/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install and build monorepo
        working-directory: main
        env:
          PGUSER: postgres
          PGHOST: localhost
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Seed test database
        working-directory: main/apps/server
        env:
          PGUSER: postgres
          PGHOST: localhost
          DATABASE_URL: postgres://postgres@localhost:5432/owlmetry_test
        run: ./node_modules/.bin/tsx ../../scripts/seed-test-db.mts

      - name: Seed backend test app + server client key
        env:
          PGUSER: postgres
          PGHOST: localhost
          PGDATABASE: owlmetry_test
        run: |
          # Mirrors owlmetry/scripts/test-node-sdk.sh — seeds a backend app
          # and a client key the Node SDK integration tests use. Idempotent.
          TEST_SERVER_KEY="owl_client_eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee"
          TEAM_ID=$(psql -tA -c "SELECT id FROM teams LIMIT 1")
          PROJECT_ID=$(psql -tA -c "SELECT id FROM projects LIMIT 1")
          OWNER_ID=$(psql -tA -c "SELECT user_id FROM team_members WHERE team_id = '$TEAM_ID' AND role = 'owner' LIMIT 1")
          EXISTING=$(psql -tA -c "SELECT id FROM api_keys WHERE secret = '$TEST_SERVER_KEY' LIMIT 1")
          if [ -z "$EXISTING" ]; then
            psql -v ON_ERROR_STOP=1 <<SQL
          DO \$\$
          DECLARE
            v_app_id uuid;
          BEGIN
            INSERT INTO apps (team_id, project_id, name, platform, bundle_id)
            VALUES ('$TEAM_ID', '$PROJECT_ID', 'Test Server App', 'backend', NULL)
            RETURNING id INTO v_app_id;
            INSERT INTO api_keys (secret, key_type, app_id, team_id, name, permissions, created_by)
            VALUES ('$TEST_SERVER_KEY', 'client', v_app_id, '$TEAM_ID', 'Test Server Key', '["events:write","users:write"]'::jsonb, '$OWNER_ID');
          END \$\$;
          SQL
            echo "Backend test app seeded"
          else
            psql -c "UPDATE api_keys SET permissions = '[\"events:write\",\"users:write\"]'::jsonb WHERE secret = '$TEST_SERVER_KEY'"
            echo "Backend test app existed, refreshed permissions"
          fi

      - name: Start test server (detached)
        working-directory: main/apps/server
        env:
          DATABASE_URL: postgres://postgres@localhost:5432/owlmetry_test
          PORT: "4112"
          JWT_SECRET: test-secret
          HOST: 127.0.0.1
          API_PUBLIC_URL: http://127.0.0.1:4112
        run: |
          # nohup + disown so the server survives past the step boundary.
          nohup ./node_modules/.bin/tsx src/index.ts > /tmp/server.log 2>&1 < /dev/null &
          SERVER_PID=$!
          echo "$SERVER_PID" > /tmp/server.pid
          disown "$SERVER_PID"
          for i in $(seq 1 60); do
            if curl -sf "http://127.0.0.1:4112/health" > /dev/null 2>&1; then
              echo "Server ready (pid $(cat /tmp/server.pid))"
              exit 0
            fi
            sleep 0.5
          done
          echo "Server failed to start"
          cat /tmp/server.log
          exit 1

      - name: Confirm server still up after step boundary
        run: |
          if ! kill -0 "$(cat /tmp/server.pid)" 2>/dev/null; then
            echo "Server PID $(cat /tmp/server.pid) is gone after step boundary"
            cat /tmp/server.log
            exit 1
          fi
          curl -sf "http://127.0.0.1:4112/health" | head -c 500
          echo
          echo "Server healthy ✓"

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm ci

      - name: Run SDK integration tests
        working-directory: sdk
        timeout-minutes: 10
        env:
          OWLMETRY_TEST_ENDPOINT: http://127.0.0.1:4112
          OWLMETRY_TEST_SERVER_KEY: owl_client_eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee
          OWLMETRY_TEST_AGENT_KEY: owl_agent_bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
        run: npm run test:integration

      - name: Stop test server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: server-log
          path: /tmp/server.log
